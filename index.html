<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rappi Training Insights</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FFF8F5;--surface:#fff;--surface2:#FFF2EC;--border:#FFD0BA;
  --accent:#FF441A;--accent-light:#FFF0EA;--accent-mid:#FF6B40;
  --danger:#C0392B;--danger-light:#FDECEA;
  --warn:#E67E22;--warn-light:#FEF3E2;
  --success:#27AE60;--success-light:#EAFAF1;
  --text:#1A0D08;--text-muted:#7A4A38;--text-soft:#B88070;
  --font:"DM Sans",sans-serif;--mono:"DM Mono",monospace;
  --radius:16px;--radius-sm:10px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.hero{background:linear-gradient(135deg,#FF441A 0%,#FF6B40 60%,#FF8C60 100%);padding:3.5rem 2rem;text-align:center;position:relative;overflow:hidden;}
.hero-title{font-size:32px;font-weight:700;color:white;letter-spacing:-0.5px;margin-bottom:8px;}
.hero-sub{font-size:14px;color:rgba(255,255,255,0.85);font-weight:400;}
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);}
.tabs-bar{background:var(--surface);padding:0 1.5rem;display:flex;gap:2px;max-width:1100px;margin:0 auto;}
.main-tab{padding:14px 18px;font-size:14px;font-weight:500;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text-muted);background:transparent;transition:all 0.15s;display:flex;align-items:center;gap:7px;}
.main-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;background:var(--accent-light);color:var(--accent);border-radius:10px;}
.layout{max-width:1100px;margin:0 auto;padding:0 1.5rem 2rem;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.upload-wrap{padding:1.25rem 0 1rem; display: flex; gap: 10px; align-items: center;}
.upload-compact{flex: 1; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); padding: 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; background: var(--surface); transition: all 0.2s;}
.upload-compact:hover{border-color:var(--accent-mid);background:var(--accent-light);}
.upload-icon-sm{width:44px;height:44px;background:var(--accent-light);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.upload-icon-sm svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2;}
.btn-export{background: white; border: 1px solid var(--accent); color: var(--accent); padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s;}
.btn-export:hover{background: var(--accent); color: white;}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;position:relative;transition: 0.2s;}
.hist-card:hover{border-color:var(--accent-mid);box-shadow:0 8px 20px rgba(255,68,26,0.1);transform:translateY(-2px);}
.hist-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;}
.hist-card-del{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--text-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.hist-card-del:hover{background:var(--danger-light);color:var(--danger);}
.hist-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;margin:16px 0;background:var(--surface2);border-radius:var(--radius-sm);overflow:hidden;}
.hist-metric{padding:12px 8px;text-align:center;border-right:1px solid var(--border);}
.hist-metric:last-child{border-right:none;}
.hist-metric-val{font-size:22px;font-weight:700;}
.hist-metric-lbl{font-size:11px;color:var(--text-soft);margin-top:4px;}
.c-green { color: var(--success) !important; }
.c-orange { color: var(--warn) !important; }
.c-red { color: var(--danger) !important; }
.detail-header{display:flex;align-items:center;gap:15px;padding:1.5rem 0 1rem;}
.btn-back{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-back:hover{background:var(--accent);border-color:var(--accent);}
.btn-back:hover svg{stroke:white;}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:1.5rem;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1.25rem;}
.metric-label{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;margin-bottom:8px;}
.metric-value{font-size:32px;font-weight:700;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;}
.section-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;}
.section-title svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:2;}
.team-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:1.25rem;position:relative; margin-bottom:10px;}
.team-card.winner{border-color:var(--accent-mid);background:var(--accent-light);}
.winner-badge{position:absolute;top:12px;right:12px;font-size:10px;font-weight:700;padding:2px 10px;background:var(--accent);color:white;border-radius:20px;}
.question-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:12px;}
.question-header{display:flex;justify-content:space-between;gap:15px;margin-bottom:10px;}
.question-text{font-size:14px;font-weight:500;line-height:1.5;flex:1;}
.q-bar-wrap{background:var(--border);border-radius:6px;height:6px;}
.q-bar{height:6px;border-radius:6px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">Rappi Training Insights</div>
  <div class="hero-sub">Capacitaciones & Métricas — Soporte & Procesos</div>
</div>

<div class="tabs-wrap">
  <div class="tabs-bar">
    <button class="main-tab active" id="tab-training-btn" onclick="switchTab('training')">Capacitaciones <span class="tab-badge" id="training-count">0</span></button>
    <button class="main-tab" id="tab-detail-btn" onclick="switchTab('detail')" style="display:none;">Detalle</button>
  </div>
</div>

<div class="layout">
  <div id="tab-training" class="tab-content active">
    <div class="upload-wrap">
      <div class="upload-compact" onclick="document.getElementById('file-in').click()">
        <div class="upload-icon-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="upload-compact-text"><p style="font-weight:600">Subir Reporte</p></div>
        <input type="file" id="file-in" style="display:none" onchange="handleFile(event)">
      </div>
      <button class="btn-export" onclick="exportData()">⬇ Descargar Base de Datos</button>
    </div>
    <div id="training-container" class="history-grid"></div>
  </div>

  <div id="tab-detail" class="tab-content">
    <div class="detail-header">
      <button class="btn-back" onclick="switchTab('training')">←</button>
      <h2 id="detail-title"></h2>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
let history = [];

// FUNCION NUEVA: Carga datos desde GitHub si existen
async function loadExternalData() {
  try {
    const response = await fetch('data.json');
    if (response.ok) {
      const externalData = await response.json();
      history = externalData;
      renderList();
    }
  } catch (e) { console.log("No se encontró base de datos externa."); }
}

function switchTab(t) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
}

function getColorClass(val) {
    if (val >= 80) return 'c-green';
    if (val >= 60) return 'c-orange';
    return 'c-red';
}

function handleFile(e) {
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const dataArr = new Uint8Array(e.target.result);
    const workbook = XLSX.read(dataArr, {type: 'array'});
    let jsonData = null;
    for (const sn of workbook.SheetNames) {
      const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sn], {defval: ''});
      if (rows.length > 0) {
        const cols = Object.keys(rows[0]).join('|').toLowerCase();
        if ((cols.includes('puntuaci') || cols.includes('puntaje')) && cols.includes('equipo')) {
          jsonData = rows; break;
        }
      }
    }
    if (jsonData) process(jsonData, f.name);
  };
  reader.readAsArrayBuffer(f);
}

function process(data, fname) {
  const cols = Object.keys(data[0]);
  const pCol = cols.find(c => c.toLowerCase().includes('puntuaci') || c.toLowerCase().includes('puntaje'));
  const eCol = cols.find(c => c.toLowerCase().includes('equipo') || c.toLowerCase().includes('team'));
  const qCols = cols.filter(c => c.includes('?'));

  let raw = data.map(r => parseFloat(String(r[pCol]).split('/')[0])).filter(v => !isNaN(v));
  const max = Math.max(...raw);
  let mult = max <= 5 ? 20 : (max <= 10 ? 10 : 1);
  const scores = raw.map(s => s * mult);
  const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) || 0;
  const pass = Math.round((scores.filter(s=>s>=70).length / scores.length)*100) || 0;

  const teamsMap = {};
  data.forEach(r => {
    const s = parseFloat(String(r[pCol]).split('/')[0]) * mult;
    if(!isNaN(s)) {
      const t = (r[eCol] || 'Sin equipo').trim();
      if(!teamsMap[t]) teamsMap[t] = [];
      teamsMap[t].push(s);
    }
  });

  const teamResults = Object.entries(teamsMap).map(([name, vals]) => ({
    name, avg: Math.round(vals.reduce((a,b)=>a+b,0)/vals.length), count: vals.length
  })).sort((a,b) => b.avg - a.avg);

  const qStats = qCols.map(q => {
    const ans = data.map(r => r[q]).filter(a => a !== '');
    const freq = {};
    ans.forEach(a => freq[a] = (freq[a]||0)+1);
    const top = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0]?.[1] || 0;
    return { q, err: Math.round(((ans.length - top)/ans.length)*100) || 0 };
  }).sort((a,b) => b.err - a.err);

  history.unshift({ id: Date.now(), fname, avg, pass, teamResults, qStats, total: scores.length });
  renderList();
}

function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(history));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "data.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

function renderList() {
  document.getElementById('training-count').innerText = history.length;
  const cont = document.getElementById('training-container');
  cont.innerHTML = history.map(h => `
    <div class="hist-card" onclick="openDetail(${h.id})">
      <div style="font-weight:700; font-size:15px;">${h.fname}</div>
      <div class="hist-metrics">
        <div class="hist-metric"><div class="hist-metric-val ${getColorClass(h.avg)}">${h.avg}%</div><div class="hist-metric-lbl">Promedio</div></div>
        <div class="hist-metric"><div class="hist-metric-val ${getColorClass(h.pass)}">${h.pass}%</div><div class="hist-metric-lbl">Aprobación</div></div>
        <div class="hist-metric"><div class="hist-metric-val">${h.total}</div><div class="hist-metric-lbl">Agentes</div></div>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const h = history.find(x => x.id === id);
  document.getElementById('detail-title').innerText = h.fname;
  document.getElementById('tab-detail-btn').style.display = 'block';
  document.getElementById('detail-body').innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Muestra</div><div class="metric-value">${h.total}</div></div>
      <div class="metric-card"><div class="metric-label">Promedio</div><div class="metric-value ${getColorClass(h.avg)}">${h.avg}%</div></div>
      <div class="metric-card"><div class="metric-label">Aprobación</div><div class="metric-value ${getColorClass(h.pass)}">${h.pass}%</div></div>
    </div>
    <div class="section"><div class="section-title">Resultados Equipo</div><div class="teams-grid">${h.teamResults.map(t => `<div class="team-card"><strong>${t.name}</strong>: ${t.avg}%</div>`).join('')}</div></div>
    <div class="section"><div class="section-title">Preguntas Críticas</div><div class="questions-list">${h.qStats.map(q => `<div class="question-item"><div>${q.q}</div><strong>${q.err}% error</strong></div>`).join('')}</div></div>
  `;
  switchTab('detail');
}

loadExternalData();
</script>
</body>
</html>
